services:
  node-api:
    build: ./node-api
    ports:
      - "${NODE_PORT}:${NODE_PORT}"
    env_file:
      - ./node-api/.env
    environment:
      - PYTHON_LLM_URL=http://python-llm:${PYTHON_PORT}
    volumes:
      - node-data:/app/data
    depends_on:
      python-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "docker-script/docker-healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  python-llm:
    build: ./python-llm
    ports:
      - "${PYTHON_PORT}:${PYTHON_PORT}"
    env_file:
      - ./python-llm/.env
    healthcheck:
      test: ["CMD", "python", "docker-script/docker-healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  node-data:
